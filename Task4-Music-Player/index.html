<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

    <h1>🎵 Music Player</h1>

    <div class="song-info">
        <h2>My Favorite Song</h2>
        <p>Enjoy your music!</p>
    </div>

    <audio controls id="audio" src="songs/song1.mp3"></audio>

    <div class="controls">
        <button onclick="playMusic()">▶ Play</button>
        <button onclick="pauseMusic()">⏸ Pause</button>
    </div>

    <div class="volume">
        <label>🔊 Volume</label>
        <input type="range"
               min="0"
               max="1"
               step="0.1"
               value="1"
               onchange="changeVolume(this.value)">
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
