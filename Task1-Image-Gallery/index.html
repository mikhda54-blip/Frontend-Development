<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">
    <img src="images/img1.jpg" onclick="openImage(this.src)">
    <img src="images/img2.jpg" onclick="openImage(this.src)">
    <img src="images/img3.jpg" onclick="openImage(this.src)">
    <img src="images/img4.jpg" onclick="openImage(this.src)">
</div>

<div id="lightbox">
    <span onclick="closeImage()">X</span>
    <img id="lightbox-img">
</div>

<script src="script.js"></script>

</body>
</html>
